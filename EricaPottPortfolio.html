<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erica Potts — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream:#faf6ee;
  --warm:#f4efe6;
  --leaf:#3d6b2e;
  --leaf-mid:#5a8c47;
  --char:#2c2820;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--char);
  cursor:none;
}

/* CURSOR */
#cur{
  position:fixed;width:10px;height:10px;
  background:var(--leaf);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}
#cring{
  position:fixed;width:34px;height:34px;
  border:1px solid var(--leaf-mid);
  border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
}

/* FIXED IVY */
.ivy-top,.ivy-bottom{
  position:fixed;left:0;right:0;
  height:200px;pointer-events:none;
  z-index:5;
}
.ivy-top{top:0}
.ivy-bottom{bottom:0;transform:scaleY(-1)}
.ivy-top img,.ivy-bottom img{
  width:100%;height:100%;object-fit:cover;
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;
  padding:20px;
  background:rgba(0,0,0,.6);
  z-index:100;
}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-name{
  font-family:'Cormorant Garamond',serif;
  font-size:70px;
  color:white;
}

/* SECTION */
.wrap{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

/* ABOUT */
#about{background:var(--warm)}
.about-grid{
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:50px;
}
.portrait-wrap img{
  width:100%;
}

/* GALLERY */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.tab-btn{
  padding:10px;
  cursor:pointer;
  opacity:.4;
  border:none;
  background:none;
}
.tab-btn.active{opacity:1}

.tab-panel{display:none}
.tab-panel.active{display:block}

.ggrid{
  display:grid;
  gap:5px;
}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}

.gi{
  position:relative;
  overflow:hidden;
}
.gi img{
  width:100%;
  display:block;
}
.gi-ov{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.3s;
}
.gi:hover .gi-ov{opacity:1}

<!-- ── FOOTER ── -->
<footer>
  <div class="fl-left">Erica Potts — Portfolio</div>
  <div class="fl-right">© 2026</div>
</footer>

<script>
/* ── CURSOR ── */
const C = document.getElementById('cur');
const R = document.getElementById('cring');

if (C && R) {
  let mx = window.innerWidth / 2;
  let my = window.innerHeight / 2;
  let rx = mx;
  let ry = my;

  document.addEventListener('mousemove', (e) => {
    mx = e.clientX;
    my = e.clientY;
  });

  function cursorLoop() {
    C.style.left = mx + 'px';
    C.style.top = my + 'px';

    rx += (mx - rx) * 0.14;
    ry += (my - ry) * 0.14;

    R.style.left = rx + 'px';
    R.style.top = ry + 'px';

    requestAnimationFrame(cursorLoop);
  }
  cursorLoop();

  document.querySelectorAll('a, button, .gi').forEach((el) => {
    el.addEventListener('mouseenter', () => {
      C.style.width = '20px';
      C.style.height = '20px';
    });
    el.addEventListener('mouseleave', () => {
      C.style.width = '10px';
      C.style.height = '10px';
    });
  });
}

/* ── TABS ── */
const tabs = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.tab-panel');

if (tabs.length && panels.length) {
  tabs.forEach((tab, i) => {
    tab.addEventListener('click', () => {
      tabs.forEach((t) => t.classList.remove('active'));
      panels.forEach((p) => p.classList.remove('active'));

      tab.classList.add('active');
      if (panels[i]) panels[i].classList.add('active');
    });
  });

  tabs[0].classList.add('active');
  panels[0].classList.add('active');
}

/* ── SCROLL REVEAL ── */
const revealItems = document.querySelectorAll('.rev');

if (revealItems.length) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in');
      }
    });
  }, {
    threshold: 0.07,
    rootMargin: '0px 0px -44px 0px'
  });

  revealItems.forEach((el) => observer.observe(el));
}

/* ── AUDIO PLAYER (SIMULATED) ── */
function tp(btn) {
  const p = btn.querySelector('svg path');
  const card = btn.closest('.vcard');
  const bar = card ? card.querySelector('.abar-fill') : null;
  const t = card ? card.querySelector('.atime') : null;

  if (!p || !bar || !t) return;

  if (btn._on) {
    btn._on = 0;
    p.setAttribute('d', 'M0 0 L10 6 L0 12Z');
    clearInterval(btn._iv);
    bar.style.width = '0%';
    t.textContent = '0:00';
  } else {
    btn._on = 1;
    p.setAttribute('d', 'M2 1 L2 11 M8 1 L8 11');
    let s = 0;

    btn._iv = setInterval(() => {
      s++;
      const pct = Math.min(s / 2, 100);
      bar.style.width = pct + '%';

      const m = Math.floor(s / 120);
      const sec = Math.floor(s / 2) % 60;
      t.textContent = m + ':' + String(sec).padStart(2, '0');

      if (pct >= 100) {
        clearInterval(btn._iv);
        btn._on = 0;
        p.setAttribute('d', 'M0 0 L10 6 L0 12Z');
        bar.style.width = '0%';
        t.textContent = '0:00';
      }
    }, 100);
  }
}
</script>

</body>
</html>
