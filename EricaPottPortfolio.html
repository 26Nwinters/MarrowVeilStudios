<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erica Potts — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream:#faf6ee;
  --warm:#f4efe6;
  --leaf:#3d6b2e;
  --leaf-mid:#5a8c47;
  --char:#2c2820;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--char);
  cursor:none;
}

/* CURSOR */
#cur{
  position:fixed;width:10px;height:10px;
  background:var(--leaf);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}
#cring{
  position:fixed;width:34px;height:34px;
  border:1px solid var(--leaf-mid);
  border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
}

/* FIXED IVY */
.ivy-top,.ivy-bottom{
  position:fixed;left:0;right:0;
  height:200px;pointer-events:none;
  z-index:5;
}
.ivy-top{top:0}
.ivy-bottom{bottom:0;transform:scaleY(-1)}
.ivy-top img,.ivy-bottom img{
  width:100%;height:100%;object-fit:cover;
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;
  padding:20px;
  background:rgba(0,0,0,.6);
  z-index:100;
}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-name{
  font-family:'Cormorant Garamond',serif;
  font-size:70px;
  color:white;
}

/* SECTION */
.wrap{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

/* ABOUT */
#about{background:var(--warm)}
.about-grid{
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:50px;
}
.portrait-wrap img{
  width:100%;
}

/* GALLERY */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.tab-btn{
  padding:10px;
  cursor:pointer;
  opacity:.4;
  border:none;
  background:none;
}
.tab-btn.active{opacity:1}

.tab-panel{display:none}
.tab-panel.active{display:block}

.ggrid{
  display:grid;
  gap:5px;
}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}

.gi{
  position:relative;
  overflow:hidden;
}
.gi img{
  width:100%;
  display:block;
}
.gi-ov{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.3s;
}
.gi:hover .gi-ov{opacity:1}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  background:black;
  color:white;
}
</style>
</head>

<body>

<div id="cur"></div>
<div id="cring"></div>

<!-- HERO -->
<section id="hero">
  <h1 class="hero-name">Erica Potts</h1>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="wrap">
    <div class="about-grid">

      <div class="portrait-wrap">
        <img src="https://via.placeholder.com/400">
      </div>

      <div>
        <p>
          This is your about section. Replace this with your actual bio.
        </p>
      </div>

    </div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <div class="wrap">

    <div class="tabs">
      <button class="tab-btn active">Art</button>
      <button class="tab-btn">Design</button>
    </div>

    <div class="tab-panel active">
      <div class="ggrid g3">

        <div class="gi">
          <img src="https://via.placeholder.com/400">
          <div class="gi-ov">Art</div>
        </div>

        <div class="gi">
          <img src="https://via.placeholder.com/400">
          <div class="gi-ov">Art</div>
        </div>

        <div class="gi">
          <img src="https://via.placeholder.com/400">
          <div class="gi-ov">Art</div>
        </div>

      </div>
    </div>

    <div class="tab-panel">
      <div class="ggrid g2">

        <div class="gi">
          <img src="https://via.placeholder.com/600x400">
          <div class="gi-ov">Design</div>
        </div>

        <div class="gi">
          <img src="https://via.placeholder.com/600x400">
          <div class="gi-ov">Design</div>
        </div>

      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Erica Potts
</footer>

<script>
/* CURSOR */
const cur = document.getElementById("cur");
const ring = document.getElementById("cring");

document.addEventListener("mousemove", e=>{
  cur.style.left=e.clientX+"px";
  cur.style.top=e.clientY+"px";
  ring.style.left=e.clientX+"px";
  ring.style.top=e.clientY+"px";
});

/* TABS */
const tabs=document.querySelectorAll(".tab-btn");
const panels=document.querySelectorAll(".tab-panel");

tabs.forEach((tab,i)=>{
  tab.addEventListener("click",()=>{
    tabs.forEach(t=>t.classList.remove("active"));
    panels.forEach(p=>p.classList.remove("active"));

    tab.classList.add("active");
    panels[i].classList.add("active");
  });
});
</script>

</body>
</html>
